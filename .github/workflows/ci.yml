name: Retriever CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --frozen

      - name: Ruff check
        working-directory: apps/api
        run: uv run ruff check src/ tests/

      - name: pytest
        working-directory: apps/api
        run: uv run python -m pytest tests/ -q -m "not integration"

  background-workers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: workers
        run: uv sync --frozen

      - name: Ruff check
        working-directory: workers
        run: uv run ruff check src/

  frontend-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Next.js lint
        working-directory: apps/web
        run: npm run lint
