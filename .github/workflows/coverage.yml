name: Coverage

on:
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --frozen

      - name: Run tests with coverage
        working-directory: apps/api
        run: uv run python -m pytest tests/ -q -m "not integration" --cov=src --cov-report=xml --cov-report=term-missing

      - name: Coverage comment
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-coverage-path: apps/api/coverage.xml
          title: Coverage Report
          badge-title: Coverage
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-line-counts: false
          junitxml-path: apps/api/coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/api/coverage.xml
          flags: api
          fail_ci_if_error: false
